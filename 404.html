<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/Content/index/favicon.ico">
<title>404 - Not Found</title>

<style>
body {
  background: #0d4a82;
  color: white;
  font-family: Verdana, sans-serif;
  text-align: center;
  padding-top: 100px;
}

.box {
  display: inline-block;
  background: #f5ffff;
  color: black;
  border: 2px solid #006666;
  padding: 20px;
  box-shadow:
    inset 1px 1px 0 #ffffff,
    inset -1px -1px 0 #003333;
}

a {
  color: blue;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="box">
  <h1>404</h1>
  <p>uhh... this page kinda doesn't exist 😭</p>
  <p><a href="/">go back to welcome</a></p>
  <p><a href="/Home">go back home</a></p>
</div>

<audio id="clickSound" src="/Content/click2.wav" preload="auto"></audio>
<script>
function playClick() {
  const sound = new Audio("/Content/click2.mp3");
  sound.volume = 0.3;
  sound.play();
}

document.querySelectorAll("button, a").forEach(el => {
  el.addEventListener("click", playClick);
});
</script>

</body>
</html>
