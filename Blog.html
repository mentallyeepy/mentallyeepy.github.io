<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<body>

<!--MentallyEepy/CodenamePixel is the owner. I am the owner, do not touch my website code, God bless, may you live long and prosper, goodbye now.-->

<!-- Side navigation -->
{% include sidebar.html %}

<div class="content">
	<div class="content-box">
		<h1>Blog</h1>

		<a href="/feed.xml" style="display:inline-flex; align-items:center; gap:6px;">
		  <img src="/Content/rss.png" width="20">
		  RSS Feed
		</a>
		
		{% for post in site.posts %}
		  <div class="blog-post">
		    <h2>{{ post.title }}</h2>
		    <p style="font-size: 12px; opacity: 0.7;">{{ post.date | date: "%Y-%m-%d %H:%M" }}</p>
		    
		    <p>{{ post.excerpt }}</p>
		    
		    <a href="{{ post.url }}">Read more →</a>
		    <hr>
		  </div>
		{% endfor %}
		
		<p hidden>I like to move it move it</p>
		<p></p>
		
		<!--Site counter-->
		<p style="font-family: Tahoma; font-size: 12px;">
		Visitors:
		<span id="counter" style="color: #006666; font-weight: bold; background: #000; color: #00ff00; padding: 0 4px; font-family: monospace;">000000</span>
		</p>
		
		<script>
		let visits = localStorage.getItem("siteVisits");
		
		if (!visits) visits = 0;
		visits++;
		
		localStorage.setItem("siteVisits", visits);
		
		document.getElementById("counter").textContent =
		visits.toString().padStart(6, "0");
		</script>
	</div>
</div>

<audio id="clickSound" src="/Content/click.wav" preload="auto"></audio>
<script>
const clickSound = document.getElementById("clickSound");

document.addEventListener("click", function() {
  clickSound.currentTime = 0; // rewind so it plays every time
  clickSound.volume = 0.8;
  clickSound.play();
});
</script>
</body>
