<script>
  // Wait for the window to load so it finds the element correctly
  window.onload = function() {
    // 1. Get the current count from the browser's storage
    let visits = localStorage.getItem("siteVisits");
    
    // 2. If it's the first time visiting, start at 0
    if (visits === null) {
      visits = 0;
    }
    
    // 3. Increment the count (parseInt ensures it stays a number)
    visits = parseInt(visits) + 1;
    
    // 4. Save the new number back to the browser
    localStorage.setItem("siteVisits", visits);
    
    // 5. Update the number on the screen
    const counterElement = document.getElementById("counter");
    if (counterElement) {
      // padStart(6, "0") keeps that cool 000042 look
      counterElement.textContent = visits.toString().padStart(6, "0");
    }
  };
</script>

<!-- The Modal / Stage -->
<div id="imageModal" class="modal" onclick="closeModal()">
  <span class="close-button">&times;</span>
  <img class="modal-content" id="expandedImg">
  <div id="captionText"></div>
</div>
<script>
function enlargeImage(imgElement, caption) {
  var modal = document.getElementById("imageModal");
  var modalImg = document.getElementById("expandedImg");
  var captionText = document.getElementById("captionText");

  modal.style.display = "block";
  modalImg.src = imgElement.src;
  captionText.innerHTML = caption;
}

function closeModal() {
  document.getElementById("imageModal").style.display = "none";
}

</script>

<audio id="clickSound" src="/Content/click.wav" preload="auto"></audio>
<script>
const clickSound = document.getElementById("clickSound");

document.addEventListener("click", function() {
  clickSound.currentTime = 0; // rewind so it plays every time
  clickSound.volume = 0.8;
  clickSound.play();
});
</script>
