<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="/Content/index/favicon.ico">
<link rel="stylesheet" href="/Content/style.css">

<title>{{ page.title }}</title>
</head>
<body>

{% include sidebar.html %}

<div class="content">
  <div class="content-box">

    <h1>{{ page.title }}</h1>
    <p style="font-size: 12px; opacity: 0.7;">
      {{ page.date | date: "%Y-%m-%d %H:%M" }} (UTC{{ page.date | date: "%z" }})
    </p>

    <hr>

    {{ content }}

    <br>
    <a href="/Blog.html">← Back to Blog</a>

    <!-- Site counter (same as yours) -->
    <p style="font-family: Tahoma; font-size: 12px;">
      Visitors:
      <span id="counter" style="background:#000;color:#00ff00;padding:0 4px;font-family:monospace;">000000</span>
    </p>

  </div>
</div>

<audio id="clickSound" src="/Content/click.wav" preload="auto"></audio>

<script>
let visits = localStorage.getItem("siteVisits");
if (!visits) visits = 0;
visits++;
localStorage.setItem("siteVisits", visits);
document.getElementById("counter").textContent =
visits.toString().padStart(6, "0");

const clickSound = document.getElementById("clickSound");
document.addEventListener("click", function() {
  clickSound.currentTime = 0;
  clickSound.volume = 0.8;
  clickSound.play();
});
</script>

</body>
</html>
