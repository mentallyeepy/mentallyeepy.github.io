<div class="content">
    <div class="content-box">
        <h1>Settings</h1>
        <p>Theme:</p>
        <select onchange="setTheme(this.value)">
          <option value="">Default</option>
          <option value="dark">Dark</option>
          <option value="neon">Neon</option>
        </select>
        
    		<!--Site counter-->
		    <p style="font-family: Tahoma; font-size: 12px;">
		    Visitors:
		    <span id="counter" style="color: #006666; font-weight: bold; background: #000; color: #00ff00; padding: 0 4px; font-family: monospace;">000000</span>
		    </p>
		
		    <script>
	    	let visits = localStorage.getItem("siteVisits");
		    
	    	if (!visits) visits = 0;
    		visits++;
		    
    		localStorage.setItem("siteVisits", visits);
		    
		    document.getElementById("counter").textContent =
		    visits.toString().padStart(6, "0");
    </script>
    </div>
</div>
	
<!--MentallyEepy/CodenamePixel is the owner. I am the owner, do not touch my website code, God bless, may you live long and prosper, goodbye now.-->

<audio id="clickSound" src="/Content/click.wav" preload="auto"></audio>
<script>
const clickSound = document.getElementById("clickSound");

document.addEventListener("click", function() {
  clickSound.currentTime = 0; // rewind so it plays every time
  clickSound.volume = 0.8;
  clickSound.play();
});
</script>

<script>
function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem("theme", theme);
}

// load saved theme
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("theme");
  if (saved) {
    document.body.className = saved;
  }
});
</script>
</body>
