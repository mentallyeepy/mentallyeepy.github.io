<div class="content">
    <div class="content-box">
		<h1>Guestbook</h1>
  <p>200 char limit</p>
        <input id="name" placeholder="Your name">
		<input id="message" placeholder="Message">
		<button onclick="sendMessage()">Send</button>

		<div id="messages"></div>
        
    	<!--Site counter-->
		<p style="font-family: Tahoma; font-size: 12px;">
		Visitors:
		<span id="counter" style="color: #006666; font-weight: bold; background: #000; color: #00ff00; padding: 0 4px; font-family: monospace;">000000</span>
		</p>
		
		<script>
	    let visits = localStorage.getItem("siteVisits");
		  
	    if (!visits) visits = 0;
    	visits++;
		    
    	localStorage.setItem("siteVisits", visits);
		   
		document.getElementById("counter").textContent =
		visits.toString().padStart(6, "0");
    </script>
    </div>
</div>

<script>
const clickSound = document.getElementById("clickSound");

document.addEventListener("click", function() {
  clickSound.currentTime = 0; // rewind so it plays every time
  clickSound.volume = 0.8;
  clickSound.play();
});
</script>

<script>
function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem("theme", theme);
}

// load saved theme
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("theme");
  if (saved) {
    document.body.className = saved;
  }
});
</script>
