        <input id="name" placeholder="Your name">
		<input id="message" placeholder="Message">
		<button onclick="sendMessage()">Send</button>

		<div id="messages"></div>
        
    	<!--Site counter-->
		<p style="font-family: Tahoma; font-size: 12px;">
		Visitors:
		<span id="counter" style="color: #006666; font-weight: bold; background: #000; color: #00ff00; padding: 0 4px; font-family: monospace;">000000</span>
		</p>
		
		<script>
	    let visits = localStorage.getItem("siteVisits");
		  
	    if (!visits) visits = 0;
    	visits++;
		    
    	localStorage.setItem("siteVisits", visits);
		   
		document.getElementById("counter").textContent =
		visits.toString().padStart(6, "0");
    </script>

<script>
function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem("theme", theme);
}

// load saved theme
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("theme");
  if (saved) {
    document.body.className = saved;
  }
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "guestbook-1945c.firebaseapp.com",
  projectId: "guestbook-1945c",
  storageBucket: "guestbook-1945c.firebasestorage.app",
  messagingSenderId: "178036604719",
  appId: "1:178036604719:web:efaa18d9ce09279753ebda"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👇 THIS must be attached to window so your button can call it
window.sendMessage = async function() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) return;
  if (!name.trim() || !message.trim()) return;

  await addDoc(collection(db, "guestbook"), {
    name,
    message,
    time: Date.now()
  });

  loadMessages();
};

async function loadMessages() {
  const q = query(collection(db, "guestbook"), orderBy("time", "asc"));
  const querySnapshot = await getDocs(q);

  const container = document.getElementById("messages");
  container.innerHTML = "";

  querySnapshot.forEach(doc => {
    const data = doc.data();

    const msg = document.createElement("div");
    msg.className = "chat-message";

    const time = new Date(data.time).toLocaleString();

    msg.innerHTML = `
      <span class="chat-time">[${time}]</span>
      <span class="chat-name">${data.name}:</span>
      <span class="chat-text">${data.message}</span>
    `;

    container.appendChild(msg);
  });
  document.getElementById("message").value = "";
  container.scrollTop = container.scrollHeight;
}

// load on page open
loadMessages();
</script>
